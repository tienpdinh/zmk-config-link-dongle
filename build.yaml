# This file generates the GitHub Actions matrix.
---
include:
  # Dongle: BLE central, holds the keymap, OLED status screen, ZMK Studio over USB
  - board: nice_nano_v2
    shield: link_dongle dongle_display
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
    artifact-name: link_dongle
  # Left half, demoted from its default central role to peripheral
  - board: link_left
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: link_left_peripheral
  # Right half (peripheral by default)
  - board: link_right
    artifact-name: link_right_peripheral
  # settings_reset images — flash these first to clear old split bonds
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset_dongle
  - board: link_left
    shield: settings_reset
    artifact-name: settings_reset_link_left
  - board: link_right
    shield: settings_reset
    artifact-name: settings_reset_link_right
