# Dongle = BLE central for both Link halves
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# OLED status screen (dongle_display shield provides the widgets)
CONFIG_ZMK_DISPLAY=y

# Fetch battery levels from both halves for the display gauges
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# The dongle itself has no battery — don't advertise a bogus battery service
CONFIG_BT_BAS=n

# DC-DC converter (more efficient than LDO; on-board on nice!nano-compatibles)
CONFIG_BOARD_ENABLE_DCDC=y

# ZMK Studio (also set via cmake-args in build.yaml; kept here for clarity)
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# USB powered — never deep-sleep the central
CONFIG_ZMK_SLEEP=n

# Encoder driver for relayed sensor events from the halves
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# 2 connections are used by the halves; keep room for BLE host profiles
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# Stronger radio helps the dongle reach both halves reliably
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
